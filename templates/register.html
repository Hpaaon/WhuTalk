{% extends "layout.html" %}

{% block title %}注册{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">📝 注册账号</h3>
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="请设置用户名">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="请设置密码">
                    </div>
                    <div class="mb-3">
                        <label for="bio" class="form-label">个人简介（可选）</label>
                        <textarea class="form-control" id="bio" name="bio" rows="2" placeholder="简单介绍一下自己吧"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
                <p class="text-center mt-3">
                    已有账号？<a href="{{ url_for('login') }}">去登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
